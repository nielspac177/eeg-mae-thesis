# Experiment 6 — CLS token vs mean-pooling of the patch tokens.
# Champion encoder (d256_h8 @ ep90), frozen, with the stronger probe recipe (head lr 5e-4,
# 20 epochs). Only the pooling differs between the two variants.
name: exp6_pooling
kind: supervised
enc_dim: 256
enc_heads: 8
pretrained: runs/pretrain/mae_d256_h8/snapshots/encoder_ep90.pt
freeze_encoder: true
high_agreement_only: true
head: { depth: 3, hidden: 512, dropout: 0.2 }
train:
  epochs: 20
  batch_size: 32
  lr: 5.0e-4
  weight_decay: 0.05
  use_specaugment: true
  mixup_alpha: 0.2

variants:
  - name: cls
    pooling: cls
  - name: mean
    pooling: mean
