# Experiment 5 — frozen encoder vs full fine-tune, with discriminative LR.
# Champion encoder from exp3 x exp4: d256_h8 @ ep90 (best reconstruction loss, efficient).
# Stronger, consistent recipe across variants (head lr 5e-4, 20 epochs) so the ONLY
# difference is freeze vs encoder_lr — this also tests whether the near-floor frozen KLs
# in exp2/3/4 were just an undertrained recipe (lr 5e-5, 15 ep).
name: exp5_finetune
kind: supervised
enc_dim: 256
enc_heads: 8
pretrained: runs/pretrain/mae_d256_h8/snapshots/encoder_ep90.pt
pooling: cls
high_agreement_only: true
head: { depth: 3, hidden: 512, dropout: 0.2 }
train:
  epochs: 20
  batch_size: 32
  lr: 5.0e-4          # head LR (applies to head in all variants)
  weight_decay: 0.05
  use_specaugment: true
  mixup_alpha: 0.2

variants:
  - name: frozen
    freeze_encoder: true
    train: { encoder_lr: null }
  - name: finetune_enc1e5
    freeze_encoder: false
    train: { encoder_lr: 1.0e-5 }
  - name: finetune_enc5e5
    freeze_encoder: false
    train: { encoder_lr: 5.0e-5 }
  - name: finetune_enc2e4
    freeze_encoder: false
    train: { encoder_lr: 2.0e-4 }
